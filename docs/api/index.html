<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Silkweaver API Reference</title>
<script>document.documentElement.dataset.theme = localStorage.getItem('sw-docs-theme') || 'dark'</script>
<style>
  /* Windows-desktop help-viewer styling — flat, Segoe UI. Dark (default) + light themes. */
  :root{
    --win:#0078d7;--win-dark:#005a9e;
    --bg:#f0f0f0;--side:#fafafa;--content:#ffffff;--fg:#1f1f1f;--muted:#6e6e6e;--border:#d4d4d4;
    --hover:#e5f1fb;--sel:#cce8ff;
    --topbar-bg:#0078d7;--topbar-fg:#ffffff;
    --search-bg:#ffffff;--search-fg:#1f1f1f;--search-border:#ffffff;
    --link:#0066cc;--codebg:#f6f6f6;--codefg:#0a3d62;--code-inline:#ececec;--title:#103a5c;--th-bg:#eef1f4;
    --kindbg:#0078d7;--kindfg:#ffffff;
  }
  :root[data-theme="dark"]{
    --win:#2b88d8;--win-dark:#1b6ec2;
    --bg:#1b1b1b;--side:#252526;--content:#1e1e1e;--fg:#e4e4e4;--muted:#9a9a9a;--border:#3a3a3a;
    --hover:#2a2d2e;--sel:#094771;
    --topbar-bg:#2d2d30;--topbar-fg:#ffffff;
    --search-bg:#3c3c3c;--search-fg:#e4e4e4;--search-border:#5a5a5a;
    --link:#4cc2ff;--codebg:#181818;--codefg:#9cdcfe;--code-inline:#333333;--title:#cfe0ff;--th-bg:#2d2d30;
    --kindbg:#0e639c;--kindfg:#ffffff;
  }
  *{box-sizing:border-box}
  body{margin:0;height:100vh;display:flex;flex-direction:column;background:var(--bg);color:var(--fg);
    font:14px/1.55 "Segoe UI",Tahoma,Geneva,Verdana,sans-serif}
  a{color:var(--link);text-decoration:none}a:hover{text-decoration:underline}
  code{font-family:Consolas,"Courier New",monospace;background:var(--code-inline);padding:0 3px}
  /* top toolbar */
  #topbar{display:flex;align-items:center;gap:12px;height:46px;flex:0 0 46px;background:var(--topbar-bg);color:var(--topbar-fg);padding:0 14px;user-select:none}
  #title{font-size:16px;font-weight:600}#title span{font-weight:400;opacity:.85}
  #search{margin-left:auto;width:280px;height:28px;padding:0 9px;border:1px solid var(--search-border);background:var(--search-bg);color:var(--search-fg);font-size:13px;font-family:inherit}
  #search:focus{outline:none;box-shadow:0 0 0 2px var(--win-dark)}
  #theme{height:28px;padding:0 12px;border:1px solid rgba(255,255,255,.45);background:transparent;color:var(--topbar-fg);font:13px "Segoe UI",sans-serif;cursor:pointer}
  #theme:hover{background:rgba(255,255,255,.14)}
  /* body split */
  #body{flex:1;display:flex;min-height:0}
  #side{width:300px;flex:0 0 300px;background:var(--side);border-right:1px solid var(--border);overflow:auto}
  #nav{padding:4px 0 24px}
  .cat>h3{margin:12px 12px 2px;font-size:11px;font-weight:700;text-transform:uppercase;color:var(--muted)}
  .cat a{display:block;padding:3px 12px 3px 18px;color:var(--fg);font-family:Consolas,"Courier New",monospace;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;border:1px solid transparent;cursor:pointer}
  .cat a:hover{background:var(--hover)}
  .cat a.active{background:var(--sel);border-color:var(--win)}
  .cat a .mo{color:var(--muted)}
  /* content */
  #main{flex:1;overflow:auto;background:var(--content);padding:22px 34px 64px}
  #content{max-width:860px}
  h2.entry{font-family:Consolas,"Courier New",monospace;font-size:22px;font-weight:600;color:var(--title);margin:0 0 4px}
  .kind{display:inline-block;font-size:11px;font-weight:600;text-transform:uppercase;color:var(--kindfg);background:var(--kindbg);padding:1px 7px;vertical-align:middle;margin-left:9px}
  .src{color:var(--muted);font-size:12px;margin-bottom:14px}
  pre.sig{background:var(--codebg);border:1px solid var(--border);padding:10px 13px;overflow:auto;font-family:Consolas,"Courier New",monospace;font-size:13px;color:var(--codefg);white-space:pre-wrap}
  .desc{margin:14px 0;font-size:14px}
  table{border-collapse:collapse;width:100%;margin:8px 0 18px;border:1px solid var(--border)}
  th,td{text-align:left;padding:6px 10px;border-bottom:1px solid var(--border);vertical-align:top}
  th{background:var(--th-bg);color:var(--fg);font-weight:600;font-size:12px}
  td.pn{font-family:Consolas,"Courier New",monospace;color:var(--codefg);white-space:nowrap}
  h4{color:var(--fg);opacity:.8;font-size:12px;font-weight:700;text-transform:uppercase;margin:18px 0 4px}
  #home h2{color:var(--title)}
  #home h4{margin-top:22px}#home ul{margin:6px 0 16px;padding-left:20px}#home li{margin:4px 0}
  .pill{display:inline-block;background:var(--content);border:1px solid var(--border);padding:3px 10px;margin:3px;font-size:13px;color:var(--muted)}
  /* collapsible categories */
  .cat>h3{cursor:pointer;display:flex;align-items:center;gap:6px;user-select:none}
  .cat>h3:hover{color:var(--fg)}
  .cat .tw{display:inline-block;transition:transform .12s;font-size:9px;width:9px}
  .cat.collapsed .tw{transform:rotate(-90deg)}
  .cat .ct{margin-left:auto;font-weight:400;font-size:10px;opacity:.8}
  .cat.collapsed .list{display:none}
  /* guides + example code blocks */
  .guide{max-width:760px}
  .guide h1{font-size:24px;color:var(--title);margin:0 0 10px}
  .guide h2{font-size:19px;color:var(--title);margin:26px 0 8px;border-bottom:1px solid var(--border);padding-bottom:4px}
  .guide h3{font-size:16px;margin:20px 0 6px}
  .guide p{margin:10px 0}.guide li{margin:3px 0}.guide ul{padding-left:22px}
  pre.code{background:var(--codebg);border:1px solid var(--border);padding:11px 13px;overflow:auto;font-family:Consolas,"Courier New",monospace;font-size:13px;color:var(--codefg);white-space:pre;line-height:1.5}
</style>
</head>

<script>
const DATA = [{"name":"Getting Started","kind":"guide","category":"Guides","module":"docs/guides/01-getting-started.md","html":"\u003ch1>Getting Started\u003c/h1>\u003cp>Silkweaver is a multi-platform game engine that modernizes GameMaker Studio 1.4 — it keeps the familiar GMS function names (\u003ccode>draw_sprite\u003c/code>, \u003ccode>instance_create\u003c/code>, …) but uses modern TypeScript conventions (0-based indexing, native arrays, Promises, class-based objects).\u003c/p>\u003ch2>Two ways to work\u003c/h2>\u003cp>The IDE and the CLI are interchangeable front-ends over the same project folder — pick whichever suits you.\u003c/p>\u003cp>\u003cstrong>Code-first (no IDE):\u003c/strong>\u003c/p>\u003cpre class=\"code\">npm install            # once, at the repo root\nnpm run build:tooling  # builds the engine + @silkweaver/build + @silkweaver/cli\n\nnpx silkweaver new my-game\ncd my-game\nnpx silkweaver run     # builds, serves over http, opens in the browser\u003c/pre>\u003cp>\u003cstrong>GUI (the desktop IDE):\u003c/strong>\u003c/p>\u003cpre class=\"code\">npm run electron       # builds the IDE + tooling, then launches it\u003c/pre>\u003ch2>Your project is an npm package\u003c/h2>\u003cp>A Silkweaver project is just a folder: a \u003ccode>project.json\u003c/code> manifest, your objects in \u003ccode>objects/\u003c/code>, rooms in \u003ccode>rooms/\u003c/code>, and assets alongside. Because it's a normal npm package, you can edit it in any editor with full autocomplete (the engine's types ship with the project).\u003c/p>\u003ch2>Exporting\u003c/h2>\u003cpre class=\"code\">npx silkweaver export . --target web     # a portable, self-contained HTML5 folder\nnpx silkweaver export . --target win     # a packaged desktop executable (also: mac, linux)\u003c/pre>\u003cp>Read the \u003cstrong>Objects &amp; Events\u003c/strong> guide next to start building something real.\u003c/p>","id":"guide-getting-started"},{"name":"Objects & Events","kind":"guide","category":"Guides","module":"docs/guides/02-objects-and-events.md","html":"\u003ch1>Objects &amp; Events\u003c/h1>\u003cp>Silkweaver objects are \u003cstrong>one class file per object\u003c/strong> — \u003ccode>objects/&lt;name&gt;.ts\u003c/code>, exporting a \u003ccode>gm_object\u003c/code> subclass. Static fields are object metadata, instance fields are your variable defaults, and \u003ccode>on_*\u003c/code> methods are events.\u003c/p>\u003cpre class=\"code\">import { gm_object, keyboard_check, vk_left, vk_right, draw_self } from '@silkweaver/engine'\n\nexport class obj_player extends gm_object {\n    static sprite = 'spr_player'   // object metadata\n    static solid  = true\n    hp = 100                       // an instance variable, default 100\n\n    on_create() {\n        this.hspeed = 0\n    }\n\n    on_step() {\n        if (keyboard_check(vk_left))  this.x -= 4\n        if (keyboard_check(vk_right)) this.x += 4\n    }\n\n    on_draw() {\n        draw_self()\n    }\n}\u003c/pre>\u003ch2>Events\u003c/h2>\u003cp>Override \u003ccode>on_*\u003c/code> methods to handle events — the engine calls them at the right time:\u003c/p>\u003cul>\u003cli>\u003ccode>on_create\u003c/code> / \u003ccode>on_destroy\u003c/code> — when the instance is made or removed\u003c/li>\u003cli>\u003ccode>on_step\u003c/code>, plus \u003ccode>on_step_begin\u003c/code> and \u003ccode>on_step_end\u003c/code> — each frame\u003c/li>\u003cli>\u003ccode>on_draw\u003c/code> / \u003ccode>on_draw_gui\u003c/code> — rendering\u003c/li>\u003cli>\u003ccode>on_alarm(i)\u003c/code> — countdown timers (set one with \u003ccode>this.alarm[i] = 30\u003c/code>)\u003c/li>\u003cli>\u003ccode>on_collision(other)\u003c/code> — collisions with another instance\u003c/li>\u003cli>\u003ccode>on_key_press\u003c/code> / \u003ccode>on_key_release\u003c/code> / \u003ccode>on_key_held\u003c/code> — keyboard\u003c/li>\u003cli>\u003ccode>on_room_start\u003c/code> / \u003ccode>on_room_end\u003c/code>, \u003ccode>on_game_start\u003c/code> / \u003ccode>on_game_end\u003c/code>\u003c/li>\u003cli>\u003ccode>on_outside_room\u003c/code> / \u003ccode>on_intersect_boundary\u003c/code>, \u003ccode>on_path_end\u003c/code>, \u003ccode>on_animation_end\u003c/code>\u003c/li>\u003c/ul>\u003ch2>Instance variables\u003c/h2>\u003cp>The built-in instance variables work like GMS: \u003ccode>x\u003c/code>, \u003ccode>y\u003c/code>, \u003ccode>hspeed\u003c/code>, \u003ccode>vspeed\u003c/code>, \u003ccode>speed\u003c/code>, \u003ccode>direction\u003c/code>, \u003ccode>gravity\u003c/code>, \u003ccode>image_index\u003c/code>, \u003ccode>sprite_index\u003c/code>, \u003ccode>depth\u003c/code>, \u003ccode>solid\u003c/code>, \u003ccode>visible\u003c/code>, and the rest. Add your own simply as typed class fields with defaults — no casts required.\u003c/p>\u003ch2>Drawing\u003c/h2>\u003cp>Inside \u003ccode>on_draw\u003c/code>, use the \u003ccode>draw_*\u003c/code> functions: \u003ccode>draw_self\u003c/code>, \u003ccode>draw_sprite\u003c/code>, \u003ccode>draw_rectangle\u003c/code>, \u003ccode>draw_text\u003c/code>, \u003ccode>draw_set_color\u003c/code>, and many more. Browse the \u003cstrong>Drawing\u003c/strong> category in the reference for the full list.\u003c/p>\u003ch2>Static metadata\u003c/h2>\u003cp>Static fields configure the object for every instance:\u003c/p>\u003cul>\u003cli>\u003ccode>static sprite\u003c/code> — the sprite to draw (by name)\u003c/li>\u003cli>\u003ccode>static solid\u003c/code> — participates in solid collisions\u003c/li>\u003cli>\u003ccode>static visible\u003c/code>, \u003ccode>static persistent\u003c/code>, \u003ccode>static depth\u003c/code>\u003c/li>\u003cli>\u003ccode>static physics\u003c/code> (+ \u003ccode>physics_density\u003c/code>, \u003ccode>physics_restitution\u003c/code>, …) — make it a physics body\u003c/li>\u003c/ul>","id":"guide-objects-events"},{"name":"_consume_no_more_health","kind":"function","category":"Core","module":"core/game_state","signature":"function _consume_no_more_health(): boolean","description":"Returns true once each time health drops from positive to ≤ 0 (loop-internal).","params":[],"returns":"","examples":[],"id":"_consume_no_more_health"},{"name":"_consume_no_more_lives","kind":"function","category":"Core","module":"core/game_state","signature":"function _consume_no_more_lives(): boolean","description":"Returns true once each time lives drops from positive to ≤ 0 (loop-internal).","params":[],"returns":"","examples":[],"id":"_consume_no_more_lives"},{"name":"_get_engine","kind":"function","category":"Physics","module":"physics/physics_world","signature":"function _get_engine(): Matter.Engine | null","description":"Returns the raw matter.js Engine, or null if not created.\nUsed internally by physics_body.ts.","params":[],"returns":"","examples":[],"id":"_get_engine"},{"name":"_get_model_raw","kind":"function","category":"3D","module":"3d/model","signature":"function _get_model_raw(model_id: number): model_def | undefined","description":"Returns the raw model state for internal use by model_loader.ts.","params":[],"returns":"","examples":[],"id":"_get_model_raw"},{"name":"_get_system_raw","kind":"function","category":"Particles","module":"particles/particle_system","signature":"function _get_system_raw(system_id: number): part_system_def | undefined","description":"Returns the raw system state object for internal use by particle_emitter.ts.","params":[],"returns":"","examples":[],"id":"_get_system_raw"},{"name":"_get_world","kind":"function","category":"Physics","module":"physics/physics_world","signature":"function _get_world(): Matter.World | null","description":"Returns the raw matter.js World, or null if not created.\nUsed internally by physics_body.ts.","params":[],"returns":"","examples":[],"id":"_get_world"},{"name":"_mp_potential_settings","kind":"function","category":"Core","module":"core/motion_planning","signature":"function _mp_potential_settings():","description":"Internal: current potential-step settings (read by instance.mp_potential_step).","params":[],"returns":"","examples":[],"id":"_mp_potential_settings"},{"name":"_reset_game_state","kind":"function","category":"Core","module":"core/game_state","signature":"function _reset_game_state(): void","description":"Resets all gameplay globals to their defaults (used on game restart).","params":[],"returns":"","examples":[],"id":"_reset_game_state"},{"name":"_spawn_particle","kind":"function","category":"Particles","module":"particles/particle_system","signature":"function _spawn_particle(sys: part_system_def, type_id: number, x: number, y: number): void","description":"Creates a single live particle from a type at position (x, y).","params":[],"returns":"","examples":[],"id":"_spawn_particle"},{"name":"abs","kind":"function","category":"Maths, Strings & Random","module":"math/math_utils","signature":"function abs(x: number): number","description":"Returns the absolute value of x.","params":[],"returns":"","examples":[],"id":"abs"},{"name":"add_frame","kind":"method","category":"Drawing","module":"drawing/sprite","member_of":"sprite","signature":"add_frame(frame: sprite_frame): void","description":"Adds a frame to this sprite.","params":[{"name":"frame","desc":"The frame to add"}],"returns":"","examples":[],"id":"sprite.add_frame"},{"name":"add_quad","kind":"method","category":"Drawing","module":"drawing/batch_renderer","member_of":"batch_renderer","signature":"add_quad(x: number, y: number, w: number, h: number, u0: number, v0: number, u1: number, v1: number, r: number, g: number, b: number, a: number, texture: WebGLTexture): void","description":"Pushes one axis-aligned quad into the batch.\nFlushes the batch if the texture changes or the buffer is full.","params":[{"name":"x","desc":"Left edge"},{"name":"y","desc":"Top edge"},{"name":"w","desc":"Width"},{"name":"h","desc":"Height"},{"name":"u0","desc":"Left UV coordinate"},{"name":"v0","desc":"Top UV coordinate"},{"name":"u1","desc":"Right UV coordinate"},{"name":"v1","desc":"Bottom UV coordinate"},{"name":"r","desc":"Red (0–1)"},{"name":"g","desc":"Green (0–1)"},{"name":"b","desc":"Blue (0–1)"},{"name":"a","desc":"Alpha (0–1)"},{"name":"texture","desc":"WebGL texture to sample"}],"returns":"","examples":[],"id":"batch_renderer.add_quad"},{"name":"add_quad_transformed","kind":"method","category":"Drawing","module":"drawing/batch_renderer","member_of":"batch_renderer","signature":"add_quad_transformed(cx: number, cy: number, w: number, h: number, ox: number, oy: number, xscale: number, yscale: number, angle_deg: number, u0: number, v0: number, u1: number, v1: number, r: number, g: number, b: number, a: number, texture: WebGLTexture): void","description":"Pushes a rotated/scaled quad into the batch.\nUsed for draw_sprite_ext with rotation and scale.","params":[{"name":"cx","desc":"Center X"},{"name":"cy","desc":"Center Y"},{"name":"w","desc":"Width before scaling"},{"name":"h","desc":"Height before scaling"},{"name":"ox","desc":"Origin X offset from center"},{"name":"oy","desc":"Origin Y offset from center"},{"name":"xscale","desc":"Horizontal scale"},{"name":"yscale","desc":"Vertical scale"},{"name":"angle_deg","desc":"Rotation in degrees (counter-clockwise)"},{"name":"u0","desc":"Left UV"},{"name":"v0","desc":"Top UV"},{"name":"u1","desc":"Right UV"},{"name":"v1","desc":"Bottom UV"},{"name":"r","desc":"Red (0–1)"},{"name":"g","desc":"Green (0–1)"},{"name":"b","desc":"Blue (0–1)"},{"name":"a","desc":"Alpha (0–1)"},{"name":"texture","desc":"WebGL texture"}],"returns":"","examples":[],"id":"batch_renderer.add_quad_transformed"},{"name":"angle_difference","kind":"function","category":"Maths, Strings & Random","module":"math/math_utils","signature":"function angle_difference(a: number, b: number): number","description":"Returns the shortest signed difference between two angles in degrees.\nResult is in the range (-180, 180].","params":[],"returns":"","examples":[],"id":"angle_difference"},{"name":"ansi_char","kind":"function","category":"Maths, Strings & Random","module":"math/string_utils","signature":"function ansi_char(code: number): string","description":"Alias for chr(), matching GMS's ansi_char.","params":[],"returns":"","examples":[],"id":"ansi_char"},{"name":"approx","kind":"function","category":"Maths, Strings & Random","module":"math/math_utils","signature":"function approx(x: number, y: number, epsilon?: number): boolean","description":"Returns whether x is approximately equal to y within epsilon.","params":[],"returns":"","examples":[],"id":"approx"},{"name":"arccos","kind":"function","category":"Maths, Strings & Random","module":"math/math_utils","signature":"function arccos(x: number): number","description":"Arccosine, returns radians (use darccos for degrees).","params":[],"returns":"","examples":[],"id":"arccos"},{"name":"arcsin","kind":"function","category":"Maths, Strings & Random","module":"math/math_utils","signature":"function arcsin(x: number): number","description":"Arcsine, returns radians (GMS-faithful; use darcsin for degrees).","params":[],"returns":"","examples":[],"id":"arcsin"},{"name":"arctan","kind":"function","category":"Maths, Strings & Random","module":"math/math_utils","signature":"function arctan(x: number): number","description":"Arctangent, returns radians (use darctan for degrees).","params":[],"returns":"","examples":[],"id":"arctan"},{"name":"arctan2","kind":"function","category":"Maths, Strings & Random","module":"math/math_utils","signature":"function arctan2(y: number, x: number): number","description":"Two-argument arctangent, returns radians. GMS: arctan2(y, x).","params":[],"returns":"","examples":[],"id":"arctan2"},{"name":"array_concat","kind":"function","category":"Data Structures","module":"data/array_utils","signature":"function array_concat\u003cT>(...arrays: T[][]): T[]","description":"Returns a new array concatenating all the given arrays.","params":[],"returns":"","examples":[],"id":"array_concat"},{"name":"array_contains","kind":"function","catego const cats = {};
for (const e of DATA){ (cats[e.category] ||= []).push(e); }
const catOrder = Object.keys(cats).sort((a,b)=> a==='Guides'?-1 : b==='Guides'?1 : a.localeCompare(b));
const nav = document.getElementById('nav');
const content = document.getElementById('content');
let currentId = '';

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function markActive(){
  document.querySelectorAll('#nav a').forEach(a => {
    const on = a.dataset.id === currentId;
    a.classList.toggle('active', on);
    if (on) { const c = a.closest('.cat'); if (c) c.classList.remove('collapsed'); }
  });
}

function buildNav(filter){
  nav.innerHTML='';
  const f = (filter||'').toLowerCase();
  for (const cat of catOrder){
    const items = cats[cat].filter(e => !f || e.name.toLowerCase().includes(f) || (e.member_of||'').toLowerCase().includes(f));
    if (!items.length) continue;
    const div = document.createElement('div'); div.className='cat';
    // Collapsed by default; expanded when searching, for Guides, or when it holds the current entry.
    if (!(f || cat==='Guides' || items.some(e=>e.id===currentId))) div.classList.add('collapsed');
    const h = document.createElement('h3');
    h.innerHTML = '<span class="tw">▾</span>'+esc(cat)+'<span class="ct">'+items.length+'</span>';
    h.addEventListener('click', () => div.classList.toggle('collapsed'));
    div.appendChild(h);
    const list = document.createElement('div'); list.className='list';
    for (const e of items){
      const a = document.createElement('a'); a.href='#'+e.id; a.dataset.id=e.id;
      a.innerHTML = esc(e.name) + (e.member_of ? ' <span class="mo">· '+esc(e.member_of)+'</span>' : '');
      list.appendChild(a);
    }
    div.appendChild(list);
    nav.appendChild(div);
  }
  markActive();
}

function render(id){
  currentId = id;
  const main = document.getElementById('main');
  const e = DATA.find(x => x.id === id);
  if (!e){
    const guides = DATA.filter(x => x.kind==='guide');
    const apiCats = catOrder.filter(c => c!=='Guides');
    content.innerHTML = '<div id="home"><h2>Silkweaver API Reference</h2>'+
      '<p>'+DATA.length+' entries, generated directly from the engine source — so the reference can never drift from the code. Click a category in the sidebar to expand it, or search.</p>'+
      (guides.length ? '<h4>Guides</h4><ul>'+guides.map(g=>'<li><a href="#'+g.id+'">'+esc(g.name)+'</a></li>').join('')+'</ul>' : '')+
      '<h4>Reference categories</h4><p>'+apiCats.map(c=>'<span class="pill">'+esc(c)+' · '+cats[c].length+'</span>').join('')+'</p></div>';
    markActive(); return;
  }
  if (e.kind === 'guide'){
    content.innerHTML = '<article class="guide">'+e.html+'</article>';
    main.scrollTop = 0; markActive(); return;
  }
  let h = '<h2 class="entry">'+esc(e.name)+'<span class="kind">'+esc(e.kind)+'</span></h2>';
  h += '<div class="src">'+(e.member_of ? esc(e.member_of)+' · ' : '')+'<code>'+esc(e.module)+'</code></div>';
  h += '<pre class="sig">'+esc(e.signature)+'</pre>';
  if (e.description) h += '<div class="desc">'+esc(e.description)+'</div>';
  if (e.params && e.params.length){
    h += '<h4>Parameters</h4><table><tr><th>Name</th><th>Description</th></tr>';
    for (const p of e.params) h += '<tr><td class="pn">'+esc(p.name)+'</td><td>'+esc(p.desc)+'</td></tr>';
    h += '</table>';
  }
  if (e.returns) h += '<h4>Returns</h4><div>'+esc(e.returns)+'</div>';
  if (e.examples && e.examples.length){
    h += '<h4>Example</h4>';
    for (const ex of e.examples) h += '<pre class="code">'+esc(ex)+'</pre>';
  }
  content.innerHTML = h;
  main.scrollTop = 0; markActive();
}
const themeBtn = document.getElementById('theme');
function syncTheme(){ themeBtn.textContent = document.documentElement.dataset.theme === 'dark' ? 'Light' : 'Dark'; }
themeBtn.addEventListener('click', () => {
  const next = document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark';
  document.documentElement.dataset.theme = next;
  localStorage.setItem('sw-docs-theme', next);
  syncTheme();
});
syncTheme();
document.getElementById('search').addEventListener('input', ev => buildNav(ev.target.value));
window.addEventListener('hashchange', () => render(decodeURIComponent(location.hash.slice(1))));
buildNav('');
render(decodeURIComponent(location.hash.slice(1)));
</script>
